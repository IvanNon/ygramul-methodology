<svg width="100%" viewBox="0 0 680 660" role="img" xmlns="http://www.w3.org/2000/svg" style="max-width:680px;font-family:system-ui,-apple-system,sans-serif">
  <title>The Ygramul framework — 11 levers</title>
  <desc>Architecture diagram showing 11 levers built up from a foundation: the Codex at the bottom, RAG retrieval and agents above it, engagement levers and Brand Demand running on top of that, and Auto-Research at the top observing and updating everything below.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="340" y="42" text-anchor="middle" dominant-baseline="central" style="font-size:18px;font-weight:500;fill:#2C2C2A">11 levers</text>
  <text x="340" y="64" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#5F5E5A">9 engagement · 1 long-arc · 1 cross-engagement</text>
  <rect x="40" y="86" width="600" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="108" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:500;fill:#2C2C2A">The Codex — primary-source library</text>
  <text x="340" y="128" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#5F5E5A">Leaks, patents, peer-reviewed research, antitrust testimony</text>
  <text x="340" y="160" text-anchor="middle" style="font-size:12px;fill:#5F5E5A">indexed by</text>
  <line x1="340" y1="146" x2="340" y2="172" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="40" y="180" width="600" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="202" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:500;fill:#2C2C2A">RAG retrieval — vector database with semantic search</text>
  <text x="340" y="222" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#5F5E5A">Connects every recommendation to a primary source</text>
  <text x="340" y="254" text-anchor="middle" style="font-size:12px;fill:#5F5E5A">grounds</text>
  <line x1="340" y1="240" x2="340" y2="266" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="40" y="274" width="600" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="296" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:500;fill:#2C2C2A">Specialized agents</text>
  <text x="340" y="316" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#5F5E5A">Each lever operated by focused agents grounded in retrieved context</text>
  <text x="340" y="348" text-anchor="middle" style="font-size:12px;fill:#5F5E5A">operate</text>
  <line x1="340" y1="334" x2="340" y2="360" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="40" y="368" width="450" height="120" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="265" y="390" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:500;fill:#085041">Engagement levers — sequenced</text>
  <rect x="56" y="413" width="130" height="58" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="121" y="433" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:500;fill:#085041">Find &amp; index</text>
  <text x="121" y="455" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#0F6E56">L1 · L2 · L3</text>
  <rect x="200" y="413" width="190" height="58" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="295" y="433" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:500;fill:#085041">Rank</text>
  <text x="295" y="455" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#0F6E56">L4 · L5 · L6 · L7 · L8</text>
  <rect x="404" y="413" width="74" height="58" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="441" y="433" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:500;fill:#085041">Local</text>
  <text x="441" y="455" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#0F6E56">L9</text>
  <line x1="186" y1="442" x2="198" y2="442" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="442" x2="402" y2="442" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="510" y="368" width="130" height="120" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="575" y="402" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:500;fill:#3C3489">L10</text>
  <text x="575" y="424" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#534AB7">Brand &amp;</text>
  <text x="575" y="440" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#534AB7">demand</text>
  <text x="575" y="464" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#534AB7">parallel · long-arc</text>
  <text x="340" y="518" text-anchor="middle" style="font-size:12px;fill:#534AB7">observed and updated by</text>
  <path d="M340 502 Q340 512 340 528" fill="none" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4 3" opacity="0.7" marker-end="url(#arrow)" transform="rotate(180 340 515)"/>
  <rect x="40" y="544" width="600" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="566" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:500;fill:#3C3489">L11 — Auto-Research &amp; Outcome Measurement</text>
  <text x="340" y="586" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#534AB7">Cross-engagement, feeds back to update rules in L1–L10</text>
</svg>
